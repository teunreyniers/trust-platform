Handler</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="122.1035" x="5811.32" y="860.3316">variables &#8594; varList</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="124.2173" x="5811.32" y="875.4644">evaluate &#8594; varEval</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="135.021" x="5811.32" y="890.5972">setVariable &#8594; varSet</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="323.6606" x="5811.32" y="905.73">disconnect/terminate/stReload &#8594; lifecycleHandler</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="202.9219" x="5811.32" y="920.8628">stIoState/stIoWrite &#8594; ioHandler</text></g><g class="entity" data-qualified-name="GMN148" data-source-line="278" id="ent0149"><path d="M8697.19,415.9294 L8697.19,516.7262 L9000.8004,516.7262 L9000.8004,425.9294 L8990.8004,415.9294 L8697.19,415.9294" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M8990.8004,415.9294 L8990.8004,425.9294 L9000.8004,425.9294 L8990.8004,415.9294" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="110.3032" x="8703.19" y="432.9963">State Machine:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="282.6104" x="8703.19" y="448.1291">AwaitingConfig &#8594; Configured &#8594; PostLaunch</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="8703.19" y="463.2619">&#160;</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="212.437" x="8703.19" y="478.3947">Deferred launch pattern handles</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacin