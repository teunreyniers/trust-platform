13" lengthAdjust="spacing" textLength="194.7017" x="9865.18" y="814.9363">Breakpoint generation guards</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="200.6304" x="9865.18" y="830.0691">prevent stale stops after clear.</text></g><g class="entity" data-qualified-name="GMN163" data-source-line="314" id="ent0164"><path d="M9384.81,1199.4294 L9384.81,1239.695 L9579.1899,1239.695 L9579.1899,1209.4294 L9569.1899,1199.4294 L9384.81,1199.4294" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M9569.1899,1199.4294 L9569.1899,1209.4294 L9579.1899,1209.4294 L9569.1899,1199.4294" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="173.3799" x="9390.81" y="1216.4963">Per-frame source mapping</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="144.46" x="9390.81" y="1231.6291">for multi-file stepping.</text></g><g class="entity" data-qualified-name="GMN166" data-source-line="319" id="ent0167"><path d="M9060.64,446.1994 L9060.64,486.465 L9285.3553,486.465 L9285.3553,456.1994 L9275.3553,446.1994 L9060.64,446.1994" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M9275.3553,446.1994 L9275.3553,456.1994 L9285.3553,456.1994 L9275.3553,446.1994" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="203.7153" x="9066.64" y="463.2663">IEC tasks map to DAP threadId.</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="188.5254" x="9066.64" y="478.3991">step/pause apply per thread.</text></g><g class="entity" data-qualified-name="GMN169" data-source-line="324" id="ent0170"><path d="M8973.15,607.6394 L8973.15,647.905 L9222.8561,647.905 L9222.8561,617.6394 L9212.8561,607.6394 L8973.15,607.6394" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M9212.8561,607.6394 L9212.8561,617.6394 L9222.8561,617.6394 L9212.8561,607.6394" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="90.251" x="8979.15" y="624.7063">DAP ordering:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="228.7061" x="8979.15" y="639.8391">response first, then stopped event.</text></g><g class="entity" data-qualified-name="GMN172" data-source-line="329" id="ent0173"><path d="M9282.93,607.6394 L9282.93,647.905 L9535.0799,647.905 L9535.0799,617.6394 L9525.0799,607.6394 L9282.93,607.6394" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M9525.0799,607.6394 L9525.0799,617.6394 L9535.0799,617.6394 L9525.0799,607.6394" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="231.1499" x="9288.93" y="624.7063">stReload preserves paused/running</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="223.2471" x="9288.93" y="639.8391">state and revalidates breakpoints.</text></g><g class="entity" data-qualified-name="GMN175" data-source-line="334" id="ent0176"><path d="M9344.89,453.7594 L9344.89,478.8922 L9585.1063,478.8922 L9585.1063,463.7594 L9575.1063,453.7594 L9344.89,453.7594" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M9575.1063,453.7594 L9575.1063,463.7594 L9585.1063,463.7594 L9575.1063,453.7594" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="219.2163" x="9350.89" y="470.8263">stopOnEntry emits reason=entry.</text></g><g class="entity" data-qualified-name="GMN178" data-source-line="338" id="ent0179"><path d="M9033.54,1161.5994 L9033.54,1277.5291 L9324.4677,1277.5291 L9324.4677,1171.5994 L9314.4677,1161.5994 L9033.54,1161.5994" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M9314.4677,1161.5994 L9314.4677,1171.5994 L9324.4677,1171.5994 L9314.4677,1161.5994" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="269.9277" x="9039.54" y="1178.6663">Called at every statement boundary:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="146.9102" x="9039.54" y="1193.7991">1. Update last location</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="176.1475" x="9039.54" y="1208.9319">2. Check breakpoint match</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="153.0166" x="9039.54" y="1224.0647">3. Check step condition</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="199.7227" x="9039.54" y="1239.1975">4. Capture snapshot if pausing</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="119.4883" x="9039.54" y="1254.3303">5. Emit stop event</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="187.0527" x="9039.54" y="1269.4631">6. Wait on condvar if paused</text></g><g class="entity" data-qualified-name="GMN181" data-source-line="348" id="ent0182"><path d="M9639.31,1191.8594 L9639.31,1247.2578 L9826.6821,1247.2578 L9826.6821,1201.8594 L9816.6821,1191.8594 L9639.31,1191.8594" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M9816.6821,1191.8594 L9816.6821,1201.8594 L9826.6821,1201.8594 L9816.6821,1191.8594" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="118.4028" x="9645.31" y="1208.9263">Cyclic task safety:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="166.3721" x="9645.31" y="1224.0591">cleared breakpoints must</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="166.0483" x="9645.31" y="1239.1919">not re-trigger stale stops.</text></g><g class="entity" data-qualified-name="GMN184" data-source-line="354" id="ent0185"><path d="M9580.41,782.7394 L9580.41,853.2706 L9799.5838,853.2706 L9799.5838,792.7394 L9789.5838,782.7394 L9580.41,782.7394" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M9789.5838,782.7394 L9789.5838,792.7394 L9799.5838,792.7394 L9789.5838,782.7394" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="168.0098" x="9586.41" y="799.8063">Centralizes stop ordering,</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="198.1738" x="9586.41" y="814.9391">breakpoint generation checks,</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="152.9531" x="9586.41" y="830.0719">invalidated events, and</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="143.7046" x="9586.41" y="845.2047">StopGate sequencing.</text></g><g class="entity" data-qualified-name="GMN187" data-source-line="361" id="ent0188"><path d="M9255.38,797.8694 L9255.38,838.135 L9520.6188,838.135 L9520.6188,807.8694 L9510.6188,797.8694 L9255.38,797.8694" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M9510.6188,797.8694 L9510.6188,807.8694 L9520.6188,807.8694 L9510.6188,797.8694" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="198.4214" x="9261.38" y="814.9363">Centralizes breakpoint resolve</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="244.2388" x="